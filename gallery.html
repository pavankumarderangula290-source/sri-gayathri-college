<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGJC Photo Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="official-portal.css">
</head>
<body class="dashboard-layout">

    <div style="width: 100%; max-width: 1000px; margin: 40px auto; padding: 0 20px;">
        <div style="margin-bottom: 20px;">
            <a href="/" class="btn btn-outline">&larr; Back to Website</a>
        </div>

        <div class="dashboard-header">
            <h1>Campus Gallery</h1>
            <p>Explore Sri Gayathri Junior College events, labs, and campus life.</p>
        </div>

        <div class="grid-layout grid-3">
            <div class="card" style="padding: 0; overflow: hidden;">
                <img src="/images/gallery/1.jpg" alt="Campus Event 1" style="width: 100%; height: 200px; object-fit: cover;" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22200%22%20height%3D%22200%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20200%20200%22%20preserveAspectRatio%3D%22none%22%3E%3Cdefs%3E%3Cstyle%20type%3D%22text%2Fcss%22%3E%23holder_1%20text%20%7B%20fill%3A%23999%3Bfont-weight%3Anormal%3Bfont-family%3AHelvetica%2C%20monospace%3Bfont-size%3A10pt%20%7D%20%3C%2Fstyle%3E%3C%2Fdefs%3E%3Cg%20id%3D%22holder_1%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%23eee%22%3E%3C%2Frect%3E%3Cg%3E%3Ctext%20x%3D%2274.5%22%20y%3D%22104.5%22%3EImage%201%3C%2Ftext%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E'">
                <div style="padding: 15px;">
                    <h4 style="color: var(--primary);">Science Exhibition</h4>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Physics projects by Senior Students</p>
                </div>
            </div>
            
            <div class="card" style="padding: 0; overflow: hidden;">
                <img src="/images/gallery/2.jpg" alt="Campus Event 2" style="width: 100%; height: 200px; object-fit: cover;" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22200%22%20height%3D%22200%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20200%20200%22%20preserveAspectRatio%3D%22none%22%3E%3Cdefs%3E%3Cstyle%20type%3D%22text%2Fcss%22%3E%23holder_1%20text%20%7B%20fill%3A%23999%3Bfont-weight%3Anormal%3Bfont-family%3AHelvetica%2C%20monospace%3Bfont-size%3A10pt%20%7D%20%3C%2Fstyle%3E%3C%2Fdefs%3E%3Cg%20id%3D%22holder_1%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%23eee%22%3E%3C%2Frect%3E%3Cg%3E%3Ctext%20x%3D%2274.5%22%20y%3D%22104.5%22%3EImage%202%3C%2Ftext%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E'">
                <div style="padding: 15px;">
                    <h4 style="color: var(--primary);">Annual Sports Meet</h4>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Track and Field competitions</p>
                </div>
            </div>
            
            <div class="card" style="padding: 0; overflow: hidden;">
                <img src="/images/gallery/3.jpg" alt="Campus Event 3" style="width: 100%; height: 200px; object-fit: cover;" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22200%22%20height%3D%22200%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20200%20200%22%20preserveAspectRatio%3D%22none%22%3E%3Cdefs%3E%3Cstyle%20type%3D%22text%2Fcss%22%3E%23holder_1%20text%20%7B%20fill%3A%23999%3Bfont-weight%3Anormal%3Bfont-family%3AHelvetica%2C%20monospace%3Bfont-size%3A10pt%20%7D%20%3C%2Fstyle%3E%3C%2Fdefs%3E%3Cg%20id%3D%22holder_1%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%23eee%22%3E%3C%2Frect%3E%3Cg%3E%3Ctext%20x%3D%2274.5%22%20y%3D%22104.5%22%3EImage%203%3C%2Ftext%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E'">

                    <h4 style="color: var(--primary);">Chemistry Laboratory</h4>
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Practical sessions in progress</p>
