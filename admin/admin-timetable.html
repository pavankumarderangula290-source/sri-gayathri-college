<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Timetable Dashboard - Saanvi International School</title>
  <link rel="stylesheet" href="/portal.css">
  <style>
    .tt-grid { display: grid; grid-template-columns: 100px repeat(6, 1fr); gap: 1px; background: var(--portal-border); }
    .tt-cell { background: #fff; padding: 0.75rem; text-align: center; border: 1px solid var(--portal-border); }
    .tt-header { background: #f8fafc; font-weight: 600; padding: 0.75rem; text-align: center; border: 1px solid var(--portal-border); }
    .tt-period { font-size: 0.8rem; color: var(--portal-muted); margin-bottom: 0.25rem; }
    .tt-subject { font-weight: 600; color: var(--portal-primary); margin-bottom: 0.25rem; }
    .tt-class { font-size: 0.85rem; }
    .tt-action { margin-top: 0.5rem; font-size: 0.75rem; cursor: pointer; color: var(--portal-danger); }
  </style>
</head>
<body class="portal-page">

  <header class="portal-header">
    <div class="portal-logo">
      <img src="/images/logo.jpg" alt="Logo" width="40" height="40">
      Timetable Dashboard
    </div>
    <div class="portal-nav">
      <a href="dashboard.html" class="btn btn-outline">Back to Main Dashboard</a>
      <button onclick="sessionManager.clearSession()" class="btn btn-outline">Logout</button>
    </div>
  </header>

  <main class="portal-main" style="max-width: 1200px; margin: 2rem auto; padding: 0 1rem;">
    
    <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <div>
        <h1>Timetable Management</h1>
        <p style="color: var(--portal-muted);">Assign and view weekly timetables for all staff members</p>
      </div>
      <div>
        <button onclick="openAddTimetableModal()" class="btn btn-primary" style="text-decoration:none;">+ Assign Period</button>
      </div>
    </div>

    <div class="portal-card">
      <div class="card-header" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
        <h3 style="margin:0;">Weekly Timetable Overview</h3>
        <select id="staff-filter" class="form-control" style="width: 250px; padding: 0.5rem; border:1px solid #ccc; border-radius:4px;" onchange="renderTimetable()">
          <option value="">All Staff</option>
        </select>
      </div>
      <div id="timetable-container" style="overflow-x: auto;">
        <!-- Timetable will be rendered here -->
      </div>
    </div>

  </main>

  <!-- Add Timetable Modal -->
  <div id="add-tt-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Assign Period</h3>
        <button class="modal-close" onclick="closeModal('add-tt-modal')">&times;</button>
      </div>
      <form id="add-tt-form">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Select Staff</label>
            <select id="tt-staff" class="form-control" required></select>
          </div>
          <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
              <label class="form-label">Day of Week</label>
              <select id="tt-day" class="form-control" required>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
              </select>
            </div>
            <div class="form-group" style="flex: 1;">
              <label class="form-label">Period Number</label>
              <input type="number" id="tt-period" class="form-control" min="1" max="8" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Subject</label>
            <input type="text" id="tt-subject" class="form-control" required>
          </div>
          <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
              <label class="form-label">Class</label>
              <input type="text" id="tt-class" class="form-control" required>
            </div>
            <div class="form-group" style="flex: 1;">
              <label class="form-label">Section</label>
              <input type="text" id="tt-section" class="form-control" required>
            </div>
          </div>
          <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
              <label class="form-label">Start Time</label>
              <input type="time" id="tt-start" class="form-control" required>
            </div>
            <div class="form-group" style="flex: 1;">
              <label class="form-label">End Time</label>
              <input type="time" id="tt-end" class="form-control" required>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('add-tt-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Assign</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/portal.js"></script>
  <script src="/admin-app/admin-timetable.js"></script>
</body>
</html>
