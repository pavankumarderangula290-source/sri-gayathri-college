<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGJC Student Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="official-portal.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-graduation-cap"></i> SGJC
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active"><i class="fas fa-chart-line"></i> Performance</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="dashboard-header">
                <h1 id="welcome-message">Welcome</h1>
                <p>View your academic performance and exam results</p>
            </div>

            <div class="grid-layout grid-sidebar-layout">
                <!-- Main Area -->
                <div>
                    <div class="card">
                        <div class="card-title">Attendance Overview</div>
                        <div style="display: flex; gap: 30px; align-items: center; justify-content: center;">
                            <div class="score-circle" id="attendance-percentage">0%</div>
                            <div>
                                <p style="font-size: 1.25rem; font-weight: 600; margin-bottom: 5px;" id="attendance-status">Loading...</p>
                                <p style="color: var(--text-muted); margin-bottom: 5px;">Total Sessions: <strong id="attendance-total" style="color: var(--text-dark);">0</strong></p>
                                <p style="color: var(--text-muted);">Sessions Attended: <strong id="attendance-present" style="color: var(--accent);">0</strong></p>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">Exam Results</div>
                        <div id="exams-container">
                            <!-- Exam results injected here -->
                        </div>
                    </div>
                </div>

                <!-- Sidebar Area -->
                <div>
                    <div class="card" style="text-align: center;">
                        <div class="card-title" style="margin-bottom: 10px;">Student Profile</div>
                        <img id="profile-image" alt="Profile Image" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; display: none; margin: 0 auto 15px auto; border: 3px solid var(--border);">
                        <div style="text-align: left; font-size: 0.95rem; line-height: 1.8;">
                            <p><strong>Student ID:</strong> <span id="profile-id"></span></p>
                            <p><strong>Name:</strong> <span id="profile-name"></span></p>
                            <p><strong>Class:</strong> <span id="profile-class"></span></p>
                        </div>
                        <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
                            <div class="form-group">
                                <label class="form-label" style="text-align: left;">Update Passcode</label>
                                <div style="display: flex; gap: 10px;">
                                    <input type="password" id="new-passcode" class="form-control" placeholder="New Passcode">
                                    <button class="btn btn-primary" onclick="updatePasscode()">Update</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="portal.js"></script>
    <script>
        const session = sessionManager.requireAuth('student');
        let currentStudent = null;

        async function initDashboard() {
            currentStudent = await studentApi.getProfile(session.id);
            if (!currentStudent) {
                sessionManager.clearSession();
                return;
            }

            // Populate profile
            document.getElementById('welcome-message').textContent = `Welcome, ${currentStudent.name}`;
            document.getElementById('profile-id').textContent = currentStudent.id;
            document.getElementById('profile-name').textContent = currentStudent.name;
            document.getElementById('profile-class').textContent = currentStudent.class;
            
            const profileImage = document.getElementById('profile-image');
            if (currentStudent.imagePath) {
                profileImage.src = '/uploads/' + currentStudent.imagePath;
                profileImage.style.display = 'block';
            }

            // Attendance
            const att = await studentApi.getAttendance(session.id);
            document.getElementById('attendance-total').textContent = att.total;
            document.getElementById('attendance-present').textContent = att.present;
            const pct = att.total > 0 ? Math.round((att.present / att.total) * 100) : 0;
            const pctEl = document.getElementById('attendance-percentage');
            pctEl.textContent = `${pct}%`;
            
            const statusEl = document.getElementById('attendance-status');
            if (pct >= 75) {
                statusEl.textContent = 'Excellent Attendance';
                statusEl.style.color = 'var(--accent)';
                pctEl.style.color = 'var(--accent)';
                pctEl.style.borderColor = 'var(--accent)';
            } else if (pct >= 60) {
                statusEl.textContent = 'Average Attendance';
                statusEl.style.color = '#D97706';
                pctEl.style.color = '#D97706';
                pctEl.style.borderColor = '#D97706';
            } else {
                statusEl.textContent = 'Low Attendance (Warning)';
                statusEl.style.color = '#DC2626';
                pctEl.style.color = '#DC2626';
                pctEl.style.borderColor = '#DC2626';
            }

            // Exams
            const examsContainer = document.getElementById('exams-container');
            if (currentStudent.exams && currentStudent.exams.length > 0) {
                let html = '';
                currentStudent.exams.forEach(exam => {
                    const isWeekendExam = exam.examName.toLowerCase().includes('weekend');
                    const borderColor = isWeekendExam ? 'var(--accent)' : 'var(--border)';
                    const titleColor = isWeekendExam ? 'var(--accent)' : 'var(--primary)';
                    const badgeHtml = isWeekendExam ? `<span style="background: var(--accent); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; margin-left: 10px; vertical-align: middle;"><i class="fas fa-star"></i> Special</span>` : '';
                    
                    html += `
                    <div style="border: 2px solid ${borderColor}; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: ${isWeekendExam ? '#fffaf0' : 'transparent'};">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                            <h4 style="color: ${titleColor}; font-size: 1.1rem; margin: 0; display: flex; align-items: center;">${exam.examName} ${badgeHtml}</h4>
                            <span style="color: var(--text-muted); font-size: 0.9rem;">${exam.date}</span>
                        </div>
                        <div class="grid-layout grid-3">
                            <div class="stat-card" style="border: none; box-shadow: none; padding: 0;">
                                <h4 style="margin: 0 0 5px 0;">Subject</h4>
                                <div class="stat-val" style="font-size: 1.2rem;">${exam.subject}</div>
                            </div>
                            <div class="stat-card" style="border: none; box-shadow: none; padding: 0;">
                                <h4 style="margin: 0 0 5px 0;">Marks Obtained</h4>
                                <div class="stat-val" style="font-size: 1.2rem; color: var(--accent);">${exam.marksObtained}</div>
                            </div>
                            <div class="stat-card" style="border: none; box-shadow: none; padding: 0;">
                                <h4 style="margin: 0 0 5px 0;">Total Marks</h4>
                                <div class="stat-val" style="font-size: 1.2rem;">${exam.totalMarks}</div>
                            </div>
                        </div>
                        ${exam.remarks ? `<div style="margin-top: 15px; font-size: 0.9rem; color: var(--text-muted); border-top: 1px dashed var(--border); padding-top: 10px;"><strong>Remarks:</strong> ${exam.remarks}</div>` : ''}
                    </div>`;
                });
                examsContainer.innerHTML = html;
            } else {
                examsContainer.innerHTML = '<p style="color: var(--text-muted);">No exam results available yet.</p>';
            }
        }

        async function updatePasscode() {
            const newPass = document.getElementById('new-passcode').value;
            if (newPass.length < 4) {
                alert("Passcode must be at least 4 characters long.");
                return;
            }
            const success = await studentApi.updatePasscode(session.id, newPass);
            if (success) {
                alert("Passcode updated successfully!");
                document.getElementById('new-passcode').value = '';
            } else {
                alert("Failed to update passcode.");
            }
        }

        function logout() { sessionManager.clearSession(); }

        initDashboard();
    </script>
</body>
</html>
